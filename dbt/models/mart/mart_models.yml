version: 2

models:
  - name: mart_trips_by_payment
    description: "Trip counts and averages grouped by payment type — powers the categorical distribution tile"
    columns:
      - name: payment_type_name
        tests:
          - unique
          - not_null

  - name: mart_daily_trips
    description: "Daily trip aggregations — powers the time-series tile"
    columns:
      - name: trip_date
        tests:
          - unique
          - not_null

  - name: mart_hourly_trips
    description: "Trip volume by hour of day — shows peak demand patterns"
    columns:
      - name: pickup_hour
        tests:
          - unique
          - not_null

  - name: mart_tip_by_payment
    description: "Average tip percentage by payment type — shows tipping behavior"
    columns:
      - name: payment_type_name
        tests:
          - unique
          - not_null
