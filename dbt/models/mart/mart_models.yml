version: 2

models:
  - name: mart_trips_by_payment
    description: "Trip counts and averages grouped by payment type — powers the categorical distribution tile"
    columns:
      - name: payment_type_name
        tests:
          - unique
          - not_null

  - name: mart_daily_trips
    description: "Daily trip aggregations — powers the time-series tile"
    columns:
      - name: trip_date
        tests:
          - unique
          - not_null
